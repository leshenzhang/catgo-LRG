name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a release'
        required: false
        default: false
        type: boolean

env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            backend_target: x86_64-pc-windows-msvc
            name: Windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            backend_target: aarch64-apple-darwin
            name: macOS (Apple Silicon)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            backend_target: x86_64-unknown-linux-gnu
            name: Linux
            # Ship .deb + .rpm. AppImage (linuxdeploy) still excluded: it needs
            # FUSE and hangs 20+ min on GitHub runners. Tauri v2's RPM bundler is
            # pure-Rust (no rpmbuild), so .rpm builds fine and covers Fedora/RHEL.
            bundles: deb rpm

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    env:
      NODE_OPTIONS: --max-old-space-size=6144

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          # The Linux job builds the PyInstaller backend (~240MB), cube-processor,
          # WASM, and the Tauri release binary on one runner — the default ~14GB
          # free overflows ("No space left on device"). Reclaim ~25GB of
          # preinstalled toolchains we don't use before building.
          echo "Disk before:"; df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
            /usr/share/swift /usr/local/share/powershell || true
          sudo docker image prune --all --force 2>/dev/null || true
          echo "Disk after:"; df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build deps (tauri / webkit2gtk)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            build-essential \
            libfuse2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.11'
          channels: conda-forge
          auto-activate-base: false
          activate-environment: catgo

      - name: Install Python dependencies
        run: |
          conda install -y -c conda-forge openbabel pip
          python -m pip install --upgrade pip
          pip install pyinstaller
          grep -iv '^openbabel' server/requirements.txt > reqs_no_ob.txt
          pip install -r reqs_no_ob.txt
          rm reqs_no_ob.txt

      - name: Install Rust (cube-processor)
        uses: dtolnay/rust-toolchain@stable

      - name: Build cube-processor
        run: cargo build --release --manifest-path tools/cube-processor/Cargo.toml

      - name: Build backend (Unix)
        if: runner.os != 'Windows'
        run: |
          cd server
          python -m PyInstaller catgo_server.spec --noconfirm
          mkdir -p ../src-tauri/binaries
          cp dist/catgo-server ../src-tauri/binaries/catgo-server-${{ matrix.backend_target }}
          chmod +x ../src-tauri/binaries/catgo-server-${{ matrix.backend_target }}

      - name: Build backend (Windows)
        if: runner.os == 'Windows'
        run: |
          cd server
          python -m PyInstaller catgo_server.spec --noconfirm
          mkdir -p ../src-tauri/binaries
          cp dist/catgo-server.exe ../src-tauri/binaries/catgo-server-${{ matrix.backend_target }}.exe

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}, wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build WASM extensions
        run: |
          if ! command -v wasm-pack &> /dev/null; then
            curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          fi
          export PATH=$PATH:$HOME/.cargo/bin

          cd extensions/rust
          wasm-pack build --target web --out-dir ../rust-wasm/pkg --features wasm

          cd ../chgdiff-wasm
          wasm-pack build --target web --out-dir ../../src/lib/electronic/chgdiff-wasm-pkg

          cd ../catrender-wasm
          wasm-pack build --target web --out-dir ../../src/lib/structure/catrender/catrender-wasm-pkg

      - name: Generate documentation chunks
        run: pnpm run build:doc-chunks

      - name: Verify generated build assets
        run: |
          ls -la extensions/rust-wasm/pkg/ferrox_bg.wasm
          ls -la src/lib/electronic/chgdiff-wasm-pkg/chgdiff_wasm_bg.wasm
          ls -la src/lib/chat/docs-chunks.json

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Generate icons
        run: node scripts/generate-icons.js

      - name: Build agent sidecar (Bun-compiled Node binary)
        run: pnpm build:agent

      - name: Prepare Apple API key for notarization (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # In-app updater signing. tauri-action signs the Windows (NSIS .exe) and
          # macOS (.app.tar.gz) updater bundles with this minisign key and uploads
          # a latest.json to the release, which the installed app polls. If the
          # secret is empty the build still succeeds but emits no signed updater
          # artifacts (so no auto-update). Linux ships .deb/.rpm, which the updater
          # can't self-install — the app falls back to a download-page notice there.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # linuxdeploy (AppImage bundling) is itself an AppImage and needs FUSE,
          # which GitHub runners lack → "failed to run linuxdeploy". Make all
          # AppImage tooling extract-and-run instead of FUSE-mounting.
          APPIMAGE_EXTRACT_AND_RUN: 1
          # macOS code-signing + notarization. Signing uses a **Developer ID
          # Application** cert; notarization uses the App Store Connect API key.
          # IMPORTANT: the cert secrets are MACOS_*, NOT the APPLE_* names — those
          # are owned by ios-build.yml and hold the *iOS Apple Distribution* cert,
          # a different certificate type. Sharing one secret across both would
          # force the wrong cert on one of the two pipelines. Only the team id and
          # the notarization API key (APPLE_DEVELOPMENT_TEAM / APPLE_API_*) are
          # genuinely shared. tauri-action's own env-var names stay APPLE_* (its
          # contract); we just feed them from the MACOS_* secrets.
          # All empty on win/linux → no-op there.
          APPLE_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          # Notarization (APPLE_API_ISSUER / APPLE_API_KEY) is DISABLED: Apple's
          # notary service repeatedly hung for 2-3h on this runner (huge ~240MB
          # bundled Python backend → hundreds of nested binaries to scan, plus
          # flaky long-poll → NSURLErrorDomain -1009). The .dmg/.app are still
          # Developer-ID **signed**, so the first launch needs right-click → Open.
          # Re-enable once notarization is reliable (or the backend is slimmed).
          # APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          # APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CatGo ${{ github.ref_name }}'
          releaseBody: |
            ## CatGo — AI-driven workbench for computational materials science

            One window for the whole loop: **read almost any code's files → build & edit → run DFT / ML / MD → submit to HPC → analyse → publish.** Ships with the bundled backend server (MLP libraries excluded to keep the download lean).

            ### Downloads
            - **Windows** — `.msi` (recommended) or `.exe`
            - **macOS** — `.dmg` (Apple Silicon M1/M2/M3)
            - **Linux** — `.deb` (and `.rpm`)

            ### Installation
            - **Windows** — run the **`-setup.exe`** installer (recommended; it puts the `catgo` CLI on your PATH so `catgo view` works). The `.msi` installs the app but not the CLI.
              - Unsigned this release: if Windows SmartScreen warns, click **More info → Run anyway**. (Code signing is coming in a later build.)
            - **macOS** — open the `.dmg` and drag CatGo to Applications. **Developer-ID signed** (Apple Silicon); the first launch needs **right-click → Open → Open** (notarization is coming in a follow-up).
            - **Linux** — `sudo dpkg -i CatGo_*_amd64.deb` (or `sudo rpm -i`)
            - **Android** — install `CatGo-v*-android-universal.apk`
            - **iOS** — join the [TestFlight beta](https://testflight.apple.com/join/FdHup5Hz)

            ### Highlights
            - **Reads ~30 formats** — VASP, Quantum ESPRESSO, CP2K, ABACUS, ORCA, Gaussian, CASTEP, SIESTA, OpenMX, LAMMPS, ASE `.traj`, phonopy, HDF5, CIF, XYZ/extXYZ, mol2, PDB, cube/CHGCAR — inputs **and** outputs
            - **Writes ready-to-run decks** — VASP, QE, CP2K, ABACUS, ORCA, Gaussian, LAMMPS, GROMACS, AMBER, SPARK (headers & keywords preserved)
            - **Multi-pane workspace** — tabs, split-view and pop-outs, each pane an independent structure/trajectory
            - **CatBot** AI copilot (Claude / Codex / Gemini / Ollama / DeepSeek …) + visual DAG workflow engine + HPC submit/monitor
            - **Builders** — slabs, adsorbates, moiré, nanotubes, heterostructures, MOFs, doping, passivation
            - **Analysis** — DOS / band / COHP, Brillouin zone, XRD, phase diagrams, Gibbs & volcano plots
            - Built-in xTB / EMT calculators · OPTIMADE & PubChem search · HD render & trajectory video export

            ### New in 1.4.3
            - **LAMMPS `.data` files open correctly** — force-field data files (`Atoms # full` from `write_data`) no longer freeze the viewer for minutes or show absurd elements: the style annotation wins over column guessing (image flags were read as coordinates), atoms are shifted by the box origin, and `Pair Coeffs` no longer bleeds into the Masses table. An 11k-atom kerogen renders in seconds as C/H/O/N.
            - **Large systems no longer freeze on PBC boundary images** — the image search dropped its reactive-proxy overhead (190 s → 0.1 s for 11k atoms) and a successful zero-image WASM result no longer re-runs the search in JS.
            - **Large systems get bonds again** — worker bond requests carry a deadline (a wedged worker left big structures bondless forever) and `solid_angle` auto-downgrades to `atom_radii` above 8,000 atoms.
            - **Terminal Chinese input no longer swallows characters** — committing a pinyin candidate could emit synthetic backspaces that erased the tail of the just-typed text (timing-dependent). Fixed on desktop and mobile.
            - **Doc viewer polish** — the Render toggle sits in the editor header next to Visualize/Save with proper accent styling.

            ### New in 1.4.2
            - **Terminal file opening works end-to-end** — Ctrl+click a file in a local shell opens it again (empty-session reads were rejected by the backend), and Ctrl+click a **directory** now navigates the Files sidebar to it.
            - **"Open files in" targets are honored everywhere** — with a full-pane terminal, Split/Tab place the structure beside the terminal instead of silently doing nothing; **Overwrite replaces** the existing pane instead of splitting a new one each time; **Window + Overwrite** reuses a single popout and live-updates it on every open.
            - **PDFs render in the doc viewer on every platform** — pages are drawn with pdf.js (fit-to-width, high-DPI), so Linux no longer shows a blank frame; local PDFs/images load correctly too. Markdown preview upgraded to GitHub-grade GFM + safe raw HTML, and the Edit toggle sits in the header next to PDF/Download.
            - **`catgo view` is reliable** — repeat pushes update the External tab's label, and multi-file trajectory pushes (`catgo view a.xyz b.poscar …`) display instead of being dropped (SSE fan-out now reaches tab-alias subscribers).
            - **Desktop popout windows fixed** — structure popouts had no Tauri ACL capability, so every call from them failed (the "Update failed: … not allowed by ACL" toast). Update checks now run only in the main window.
            - **iOS: Chinese dictation into the terminal** — the transcript no longer re-appends on every recognizer refinement; Chinese takes the same reconcile path as English.
            - **MCP `catgo_analyze` repaired** — symmetry / dft_input / optimize / rdf / coordination hit real endpoints (new standalone symmetry, single-structure RDF, CrystalNN coordination).

            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for the full list.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}${{ matrix.bundles && format(' --bundles {0}', matrix.bundles) || '' }}
