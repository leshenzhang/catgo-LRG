name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a release'
        required: false
        default: false
        type: boolean

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            backend_target: x86_64-pc-windows-msvc
            name: Windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            backend_target: aarch64-apple-darwin
            name: macOS (Apple Silicon)
          - platform: macos-13
            target: x86_64-apple-darwin
            backend_target: x86_64-apple-darwin
            name: macOS (Intel)

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    env:
      NODE_OPTIONS: --max-old-space-size=6144

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.11'
          channels: conda-forge
          auto-activate-base: false
          activate-environment: catgo

      - name: Install Python dependencies
        run: |
          conda install -y -c conda-forge openbabel pip
          python -m pip install --upgrade pip
          pip install pyinstaller
          grep -iv '^openbabel' server/requirements.txt > reqs_no_ob.txt
          pip install -r reqs_no_ob.txt
          rm reqs_no_ob.txt

      - name: Build backend (Unix)
        if: runner.os != 'Windows'
        run: |
          cd server
          python -m PyInstaller catgo_server.spec --noconfirm
          mkdir -p ../src-tauri/binaries
          cp dist/catgo-server ../src-tauri/binaries/catgo-server-${{ matrix.backend_target }}
          chmod +x ../src-tauri/binaries/catgo-server-${{ matrix.backend_target }}

      - name: Build backend (Windows)
        if: runner.os == 'Windows'
        run: |
          cd server
          python -m PyInstaller catgo_server.spec --noconfirm
          mkdir -p ../src-tauri/binaries
          cp dist/catgo-server.exe ../src-tauri/binaries/catgo-server-${{ matrix.backend_target }}.exe

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}, wasm32-unknown-unknown

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build WASM extensions
        run: |
          # Use a newer wasm-pack to ensure wasm-opt = false is respected
          if ! command -v wasm-pack &> /dev/null; then
            curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          fi
          
          # Add wasm-pack to PATH if installed via script
          export PATH=$PATH:$HOME/.cargo/bin
          
          echo "Building ferrox-wasm..."
          cd extensions/rust
          wasm-pack build --target web --out-dir ../rust-wasm/pkg --features wasm
          
          echo "Building chgdiff-wasm..."
          cd ../chgdiff-wasm
          wasm-pack build --target web --out-dir ../../src/lib/electronic/chgdiff-wasm-pkg

      - name: Generate documentation chunks
        run: pnpm run build:doc-chunks

      - name: Verify generated build assets
        run: |
          ls -la extensions/rust-wasm/pkg/ferrox_bg.wasm
          ls -la src/lib/electronic/chgdiff-wasm-pkg/chgdiff_wasm_bg.wasm
          ls -la src/lib/chat/docs-chunks.json

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Generate icons
        run: node scripts/generate-icons.js

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CatGo ${{ github.ref_name }}'
          releaseBody: |
            ## CatGo Desktop Application

            This release includes the bundled backend server (excluding MLP libraries).

            ### Downloads
            - **Windows**: Download `.msi` (recommended) or `.exe`
            - **macOS (Apple Silicon)**: Download `_aarch64.dmg` (M1/M2/M3/M4)
            - **macOS (Intel)**: Download `_x64.dmg`

            ### Installation
            - **Windows**: Run the `.msi` installer
            - **macOS**: Open `.dmg` and drag CatGo to Applications

            ### Troubleshooting (macOS)
            If you see a message saying **"CatGo is damaged and can’t be opened"** or **"unidentified developer"**:
            1. Right-click `CatGo.app` in your Applications folder.
            2. Select **Open** from the context menu.
            3. Click **Open** again in the dialog that appears.
            
            Alternatively, run this command in your terminal:
            ```bash
            sudo xattr -rd com.apple.quarantine /Applications/CatGo.app
            ```

            ### Features
            - Built-in calculation backend (xTB, EMT)
            - OPTIMADE database browser
            - PubChem molecule search
            - VASP/QE/LAMMPS input generators

            ### What's New
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
