name: Test Build (Manual)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos
          - macos-intel

env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  build-windows:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'windows' }}
    runs-on: windows-latest
    name: Build Windows
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.11'
          channels: conda-forge
          auto-activate-base: false
          activate-environment: catgo

      - name: Install Python dependencies
        run: |
          conda install -y -c conda-forge openbabel pip
          python -m pip install --upgrade pip
          pip install pyinstaller
          grep -iv '^openbabel' server/requirements.txt > reqs_no_ob.txt
          pip install -r reqs_no_ob.txt
          rm reqs_no_ob.txt

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build cube-processor
        run: cargo build --release --manifest-path tools/cube-processor/Cargo.toml

      - name: Build backend
        run: |
          cd server
          python -m PyInstaller catgo_server.spec --noconfirm
          mkdir -p ../src-tauri/binaries
          cp dist/catgo-server.exe ../src-tauri/binaries/catgo-server-x86_64-pc-windows-msvc.exe

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build WASM extensions
        run: |
          if ! command -v wasm-pack &> /dev/null; then
            curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          fi
          export PATH=$PATH:$HOME/.cargo/bin

          cd extensions/rust
          wasm-pack build --target web --out-dir ../rust-wasm/pkg --features wasm

          cd ../chgdiff-wasm
          wasm-pack build --target web --out-dir ../../src/lib/electronic/chgdiff-wasm-pkg

          cd ../catrender-wasm
          wasm-pack build --target web --out-dir ../../src/lib/structure/catrender/catrender-wasm-pkg

      - name: Generate documentation chunks
        run: pnpm run build:doc-chunks

      - name: Generate icons
        run: node scripts/generate-icons.js

      - name: Build Tauri app
        run: pnpm tauri:build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CatGo-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  build-macos:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'macos' }}
    runs-on: macos-latest
    name: Build macOS (Apple Silicon)
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.11'
          channels: conda-forge
          auto-activate-base: false
          activate-environment: catgo

      - name: Install Python dependencies
        run: |
          conda install -y -c conda-forge openbabel pip
          python -m pip install --upgrade pip
          pip install pyinstaller
          grep -iv '^openbabel' server/requirements.txt > reqs_no_ob.txt
          pip install -r reqs_no_ob.txt
          rm reqs_no_ob.txt

      - name: Build backend
        run: |
          cd server
          python -m PyInstaller catgo_server.spec --noconfirm
          mkdir -p ../src-tauri/binaries
          cp dist/catgo-server ../src-tauri/binaries/catgo-server-aarch64-apple-darwin
          chmod +x ../src-tauri/binaries/catgo-server-aarch64-apple-darwin

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, wasm32-unknown-unknown

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build WASM extensions
        run: |
          if ! command -v wasm-pack &> /dev/null; then
            curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          fi
          export PATH=$PATH:$HOME/.cargo/bin

          cd extensions/rust
          wasm-pack build --target web --out-dir ../rust-wasm/pkg --features wasm

          cd ../chgdiff-wasm
          wasm-pack build --target web --out-dir ../../src/lib/electronic/chgdiff-wasm-pkg

          cd ../catrender-wasm
          wasm-pack build --target web --out-dir ../../src/lib/structure/catrender/catrender-wasm-pkg

      - name: Generate documentation chunks
        run: pnpm run build:doc-chunks

      - name: Generate icons
        run: node scripts/generate-icons.js

      - name: Build agent sidecar
        run: pnpm build:agent mac-arm

      - name: Build Tauri app
        run: |
          pnpm desktop:build
          pnpm exec tauri build --target aarch64-apple-darwin

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CatGo-macOS-ARM
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          retention-days: 7

  build-macos-intel:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'macos-intel' }}
    runs-on: macos-13
    name: Build macOS (Intel)
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.11'
          channels: conda-forge
          auto-activate-base: false
          activate-environment: catgo

      - name: Install Python dependencies
        run: |
          conda install -y -c conda-forge openbabel pip
          python -m pip install --upgrade pip
          pip install pyinstaller
          grep -iv '^openbabel' server/requirements.txt > reqs_no_ob.txt
          pip install -r reqs_no_ob.txt
          rm reqs_no_ob.txt

      - name: Build backend
        run: |
          cd server
          python -m PyInstaller catgo_server.spec --noconfirm
          mkdir -p ../src-tauri/binaries
          cp dist/catgo-server ../src-tauri/binaries/catgo-server-x86_64-apple-darwin
          chmod +x ../src-tauri/binaries/catgo-server-x86_64-apple-darwin

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, wasm32-unknown-unknown

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build WASM extensions
        run: |
          if ! command -v wasm-pack &> /dev/null; then
            curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          fi
          export PATH=$PATH:$HOME/.cargo/bin

          cd extensions/rust
          wasm-pack build --target web --out-dir ../rust-wasm/pkg --features wasm

          cd ../chgdiff-wasm
          wasm-pack build --target web --out-dir ../../src/lib/electronic/chgdiff-wasm-pkg

          cd ../catrender-wasm
          wasm-pack build --target web --out-dir ../../src/lib/structure/catrender/catrender-wasm-pkg

      - name: Generate documentation chunks
        run: pnpm run build:doc-chunks

      - name: Generate icons
        run: node scripts/generate-icons.js

      - name: Build agent sidecar
        run: pnpm build:agent mac-intel

      - name: Build Tauri app
        run: |
          pnpm desktop:build
          pnpm exec tauri build --target x86_64-apple-darwin

      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CatGo-macOS-Intel
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
          retention-days: 7
