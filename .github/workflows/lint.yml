name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prek:
    runs-on: ubuntu-latest
    # The repo carries pre-existing formatting / markdownlint / codespell
    # findings inherited from the upstream MatterViz fork. Until a dedicated
    # cleanup pass lands, run the linter as best-effort so its findings
    # surface in the logs without failing the workflow status.
    continue-on-error: true
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.3.7

      - name: Run prek
        uses: j178/prek-action@v1
        continue-on-error: true
        env:
          SKIP: eslint # skip eslint because it's additional deps are not installed correctly
