# Build the CatGo iOS app on a GitHub-hosted macOS runner.
#
# iOS apps can ONLY be built on macOS (Xcode + codesign) — this lets you produce
# an iOS build without owning a Mac. Triggered manually.
#
#   • No Apple secrets set  -> builds for the iOS SIMULATOR (unsigned) as a smoke
#     test that the frontend + russh Rust lib compile and bundle for iOS.
#   • Apple signing secrets set -> builds a signed device .ipa you can ship via
#     TestFlight. Add these repo secrets (Settings → Secrets → Actions):
#       APPLE_CERTIFICATE            base64 of your .p12 signing cert
#       APPLE_CERTIFICATE_PASSWORD   the .p12 password
#       APPLE_SIGNING_IDENTITY       e.g. "Apple Distribution: Your Name (TEAMID)"
#       APPLE_PROVISIONING_PROFILE   base64 of your .mobileprovision
#       APPLE_DEVELOPMENT_TEAM       your 10-char Apple Team ID
#     (TestFlight/App Store distribution requires the paid Apple Developer
#      Program, USD 99/yr. A free Apple ID only does 7-day local installs.)
name: iOS build

on:
  workflow_dispatch:
    inputs:
      signed:
        description: 'Build a signed device IPA (needs Apple secrets) instead of a simulator smoke build'
        type: boolean
        default: false

jobs:
  ios:
    runs-on: macos-latest # Apple Silicon, Xcode preinstalled
    name: Build iOS app
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust + iOS targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialise the iOS project
        # Generates src-tauri/gen/ios (Xcode project). Idempotent; safe per run.
        run: pnpm tauri ios init

      - name: Apply post-init Info.plist patches
        # gen/ios is regenerated by `ios init`, so re-apply the patches documented
        # in deploy/ios/README.md (kept here so CI is reproducible).
        run: |
          PLIST="src-tauri/gen/ios/CatGo_iOS/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || true
          fi

      # ---- Unsigned simulator smoke build (no Apple account needed) ----
      - name: Build (simulator, unsigned)
        if: ${{ !inputs.signed }}
        run: pnpm tauri ios build --target aarch64-sim

      # ---- Signed device IPA (needs the Apple secrets above) ----
      - name: Import signing assets
        if: ${{ inputs.signed }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          # Keychain for the signing cert.
          KEYCHAIN=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p ci "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p ci "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN"
          # Provisioning profile.
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/catgo.mobileprovision

      - name: Build (signed device IPA)
        if: ${{ inputs.signed }}
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: pnpm tauri ios build --export-method app-store-connect

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: catgo-ios
          path: |
            src-tauri/gen/ios/build/**/*.ipa
            src-tauri/gen/ios/build/**/*.app
          if-no-files-found: warn
