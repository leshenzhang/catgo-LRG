# Build the CatGo iOS app on a GitHub-hosted macOS runner.
#
# iOS apps can ONLY be built on macOS (Xcode + codesign) — this lets you produce
# an iOS build without owning a Mac. Triggered manually.
#
#   • No Apple secrets set  -> builds for the iOS SIMULATOR (unsigned) as a smoke
#     test that the frontend + russh Rust lib compile and bundle for iOS.
#   • Apple signing secrets set -> builds a signed device .ipa you can ship via
#     TestFlight. Add these repo secrets (Settings → Secrets → Actions):
#       APPLE_CERTIFICATE            base64 of your .p12 signing cert
#       APPLE_CERTIFICATE_PASSWORD   the .p12 password
#       APPLE_SIGNING_IDENTITY       e.g. "Apple Distribution: Your Name (TEAMID)"
#       APPLE_PROVISIONING_PROFILE   base64 of your .mobileprovision
#       APPLE_DEVELOPMENT_TEAM       your 10-char Apple Team ID
#     (TestFlight/App Store distribution requires the paid Apple Developer
#      Program, USD 99/yr. A free Apple ID only does 7-day local installs.)
name: iOS build

on:
  workflow_dispatch:
    inputs:
      signed:
        description: 'Build a signed device IPA (needs Apple secrets) instead of a simulator smoke build'
        type: boolean
        default: false
      upload:
        description: 'After a signed build, upload the IPA to App Store Connect / TestFlight (needs App Store Connect API key secrets)'
        type: boolean
        default: false

jobs:
  ios:
    runs-on: macos-latest # Apple Silicon, Xcode preinstalled
    name: Build iOS app
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust + iOS targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Install wasm-pack
        # The Tauri beforeBuildCommand (pnpm desktop:build → build:wasm) compiles
        # the ferrox/chgdiff/catrender WASM crates and hard-fails if wasm-pack is
        # missing. Desktop CI installs it too; mirror that here.
        run: |
          if ! command -v wasm-pack >/dev/null 2>&1; then
            curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          fi
          wasm-pack --version

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate documentation chunks
        # vite build imports src/lib/chat/rag.ts → ./docs-chunks.json, which this
        # script generates. Desktop CI runs it too; without it the frontend build
        # fails with "Could not resolve ./docs-chunks.json".
        run: pnpm run build:doc-chunks

      - name: Initialise the iOS project
        # Generates src-tauri/gen/apple (xcodegen-based Xcode project). Idempotent.
        # com.catgo.app (the tauri.conf identifier, kept for Android) is taken on the
        # App Store, so iOS ships under org.catgo.app. Override the identifier just
        # for the iOS commands via --config; Android builds from gen/android with the
        # unchanged tauri.conf identifier. Pass the SAME override on build so any
        # xcodegen regeneration keeps the iOS bundle id.
        run: pnpm tauri ios init --config '{"identifier":"org.catgo.app"}'

      - name: Apply post-init Info.plist patches
        # gen/apple is regenerated by `ios init`. Declare non-exempt-encryption so
        # App Store Connect doesn't block the build on the export-compliance prompt.
        run: |
          set -euo pipefail
          PLIST=$(find src-tauri/gen/apple -name Info.plist -path '*_iOS*' -print -quit)
          [ -n "$PLIST" ] || PLIST=$(find src-tauri/gen/apple -name Info.plist -print -quit)
          if [ -n "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST" 2>/dev/null || true
            echo "Patched $PLIST"
          else
            echo "::warning::No iOS Info.plist found under src-tauri/gen/apple"
          fi

      - name: Debug signing inputs
        if: ${{ inputs.signed }}
        run: |
          echo "=== gen/apple tree (top) ===" ; ls -la src-tauri/gen/apple || true
          echo "=== project.yml signing/bundle lines ===" ; grep -niE "PRODUCT_BUNDLE_IDENTIFIER|bundleIdPrefix|CODE_SIGN|PROVISIONING|DEVELOPMENT_TEAM|com\.catgo|org\.catgo" src-tauri/gen/apple/project.yml 2>/dev/null || echo "no project.yml matches"
          echo "=== pbxproj PRODUCT_BUNDLE_IDENTIFIER ===" ; grep -RhoE "PRODUCT_BUNDLE_IDENTIFIER = [^;]+;" src-tauri/gen/apple 2>/dev/null | sort -u || echo "none"
          echo "=== installed provisioning profiles ===" ; ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || echo "none yet"

      # ---- Unsigned simulator smoke build (no Apple account needed) ----
      - name: Build (simulator, unsigned)
        if: ${{ !inputs.signed }}
        run: pnpm tauri ios build --target aarch64-sim --config '{"identifier":"org.catgo.app"}'

      # ---- Signed device IPA ----
      # Manual signing via Tauri's native env vars: Tauri imports the cert into a
      # temp keychain, installs the provisioning profile, configures the Xcode
      # project for manual signing, and writes a matching ExportOptions.plist. This
      # is deterministic — no Apple ID login and no cloud-signing permission issues.
      - name: Build (signed device IPA)
        if: ${{ inputs.signed }}
        env:
          IOS_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          # Production (no Mac/LAN, no Python sidecar on mobile): build static-only
          # so stray backend fetches return a friendly 503 instead of hanging on
          # localhost. Mobile-native paths still work — local structure view/edit,
          # database import (rerouted via isMobile() direct fetch), and the SSH
          # terminal/files (russh over Tauri invoke, not HTTP). Backend-only UI
          # (chat/workflow/plugin_hub) is already hidden on mobile.
          VITE_STATIC_ONLY: '1'
        run: pnpm tauri ios build --export-method app-store-connect --config '{"identifier":"org.catgo.app"}'

      # ---- Upload the signed IPA to App Store Connect (TestFlight) ----
      # Needs an App Store Connect API key (App Store Connect → Users and Access →
      # Integrations → App Store Connect API). Add these repo secrets:
      #   APPLE_API_KEY_ID      the key's Key ID
      #   APPLE_API_ISSUER_ID   the Issuer ID shown on that page
      #   APPLE_API_KEY_P8      the full contents of the downloaded AuthKey_*.p8
      - name: Upload to App Store Connect (TestFlight)
        if: ${{ inputs.signed && inputs.upload }}
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_API_KEY_ID}" ] || [ -z "${APPLE_API_ISSUER_ID}" ] || [ -z "${APPLE_API_KEY_P8}" ]; then
            echo "::error::Upload requested but App Store Connect API key secrets are missing (APPLE_API_KEY_ID / APPLE_API_ISSUER_ID / APPLE_API_KEY_P8)."
            exit 1
          fi
          # altool/xcrun looks the key up by ID under these well-known dirs.
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "${APPLE_API_KEY_P8}" > ~/".appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          IPA=$(find src-tauri/gen/apple/build -name '*.ipa' -print -quit)
          if [ -z "${IPA}" ]; then echo "::error::No .ipa found to upload"; exit 1; fi
          echo "Uploading ${IPA} to App Store Connect…"
          xcrun altool --upload-app -f "${IPA}" -t ios \
            --apiKey "${APPLE_API_KEY_ID}" --apiIssuer "${APPLE_API_ISSUER_ID}"
          rm -f ~/".appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: catgo-ios
          path: |
            src-tauri/gen/apple/build/**/*.ipa
            src-tauri/gen/apple/build/**/*.app
          if-no-files-found: warn
