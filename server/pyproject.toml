[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "catgo"
version = "1.4.5.post1"
description = "CatGo â€” AI-driven workbench for computational materials science (3D viewer + workflow engine + MCP)"
readme = "README-pypi.md"
license = "AGPL-3.0-or-later"
requires-python = ">=3.10"
authors = [
    { name = "CatGo Team" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Chemistry",
    "Programming Language :: Python :: 3",
]
dependencies = [
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "pydantic>=2.0.0",
    "python-multipart>=0.0.6",
    "httpx>=0.27.0",
    "mcp>=1.0.0",
    "asyncssh>=2.14.0",
    "bcrypt>=4.0.0",
    "pynacl>=1.5.0",
    "numpy>=1.24.0",
    "scipy>=1.10.0",
    "ase>=3.22.0",
    "pymatgen>=2024.1.0",
    "networkx>=2.8",
    # Native speech-to-text for desktop voice dictation (CTranslate2). Runs
    # Whisper outside the webview â€” WebKit webviews (Linux/macOS Tauri) leak
    # unreclaimable WASM memory per inference and OOM. CPU int8 by default,
    # CUDA float16 when a GPU is present. See routers/stt.py.
    "faster-whisper>=1.0.0",
]

[project.optional-dependencies]
full = [
    "mdtraj>=1.9.9",
    "h5py>=3.0.0",
    "scikit-learn>=1.3.0",
    "custodian>=2024.1.0",
]
ml = [
    "mace-torch>=0.3.0",
]
analyze = [
    "matplotlib>=3.8",
    "scienceplots>=2.1",
    "pylustrator>=1.3",
]
mofsearch = [
    "mofdb-client>=0.10.0",
]

[project.scripts]
catgo = "catgo.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["catgo"]
# The built SPA (catgo/web/**) is a generated, git-ignored artifact copied in by
# scripts/bundle-web.mjs before `python -m build`. Whitelist it so the wheel ships
# a working UI â€” without this, `pip install catgo` would have no frontend.
artifacts = [
    "catgo/web/**/*",
]

# The server imports a few top-level modules by BARE name (`main`, the full
# `workflow` engine, `plugin_loader`, `mcp_server`). They sit outside the
# `catgo` package, so `packages=["catgo"]` cannot ship them and `pip install`ed
# `catgo app`/`serve` crashed with `ModuleNotFoundError`. Bundle them under
# `catgo/_bundled/`; `_ensure_sys_path()` puts that dir on sys.path at runtime
# so the bare imports resolve (and `workflow` here is the full engine, kept
# distinct from the smaller `catgo.workflow`).
[tool.hatch.build.targets.wheel.force-include]
"main.py" = "catgo/_bundled/main.py"
"workflow" = "catgo/_bundled/workflow"
"plugin_loader.py" = "catgo/_bundled/plugin_loader.py"
"mcp_server.py" = "catgo/_bundled/mcp_server.py"
