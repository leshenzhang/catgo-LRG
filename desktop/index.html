<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    >
    <title>CatGo</title>
    <style>
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #app {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        /* Pre-hydration fallback; app.css (loaded by main.ts) upgrades this to
           the bundled Geist via --font-sans. CJK faces kept here too so Chinese
           never tofus before app.css lands. */
        font-family: 'Geist', 'PingFang SC', 'Microsoft YaHei',
          'Noto Sans CJK SC', -apple-system, BlinkMacSystemFont, 'Segoe UI',
          Roboto, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
